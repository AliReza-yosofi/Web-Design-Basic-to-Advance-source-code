<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Shop</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style1.css">
</head>

<body>

    <header>
        <h1>My Simple Shop</h1>

        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>

        <h2>Our Products</h2>

        <div class="products">

            <!-- Product 1 -->
            <div class="product-card">
                <h3>Smart Phone</h3>

                <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500"
                     alt="Phone">

                <p><strong>Price:</strong> $300</p>

                <p>High quality smart phone.</p>

                <button>Add to Cart</button>
            </div>

            <!-- Product 2 -->
            <div class="product-card">
                <h3>Laptop</h3>

                <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500"
                     alt="Laptop">

                <p><strong>Price:</strong> $700</p>

                <p>Powerful laptop for students.</p>

                <button>Add to Cart</button>
            </div>

        </div>

    </main>

    <footer>
        <p>&copy; 2026 My Simple Shop. All rights reserved.</p>
    </footer>

</html>
