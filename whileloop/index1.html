<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

```
<title>Simple Shop</title>

<!-- CSS File -->
<link rel="stylesheet" href="style.css">
```

</head>
<body>

```
<!-- Header -->
<header>

    <h1>My Simple Shop</h1>

    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

</header>

<!-- Main -->
<main>

    <h2>Our Products</h2>

    <!-- Product 1 -->
    <div class="product">

        <h3>Smart Phone</h3>

        <img src="https://via.placeholder.com/200"
             alt="phone">

        <p>Price: $300</p>

        <p>High quality smart phone.</p>

        <button>Add to Cart</button>

    </div>

    <!-- Product 2 -->
    <div class="product">

        <h3>Laptop</h3>

        <img src="https://via.placeholder.com/200"
             alt="laptop">

        <p>Price: $700</p>

        <p>Powerful laptop for students.</p>

        <button>Add to Cart</button>

    </div>

</main>

<!-- Footer -->
<footer>

    <p>© 2026 My Simple Shop</p>

</footer>
```

</body>
</html>
