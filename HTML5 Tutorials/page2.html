<body>
   <form action="" method="post" enctype="multipart/form-data">
    <div class="box-group">
        <input type="date" name="date">
        <input type="time" name="time">
        <input type="datetime" name="datetime">
        <input type="month">
        <input type="week">
        <input type="tel" pattern="{2} {3}-{4}" placeholder="phone">
        <input type="file">
        <input type="number" step="5" min="20" max="50" placeholder="nember">
        <input type="search" placeholder="search">
        <input type="submit" placeholder="save" required>
        </div>
       <div>
        <input list="City">
        <datalist id="City">
            <option value="kabul">Kabul</option>
             <option value="Ali">Kabul</option>
              <option value="Raeza">Kabul</option>
               <option value="yosofi">Kabul</option>

        </datalist>
       </div>
   </form>
 
    <form action="" oninput="x.value=parseInt(a.value)+parseInt(b.value)">
        <input type="range" id="a" name="a" value="0"> + 100
        <input type="number" id="b" name="b" value="1"> =
        <output name="X" for="a b"></output>
    </form>
