<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
  margin: 0;
  height: 100vh;
  background: #0b1a2b;
  display: flex;
  justify-content: center;
  align-items: center;
}

.devices {
  position: relative;
  width: 500px;
  height: 350px;
}
.pc {
    background-color: black;
  position: absolute;
  top: -10px;
  left: 140px;
  width: 220px;
  height: 150px;
  border: 7px solid #ededed;
  border-radius: 6px;

}

.laptop {
  background-color:black;
  position: absolute;
  bottom: 70px;
  left: 60px;
  width: 160px;
  height: 100px;
  border: 7px solid #ffffff;
  border-radius: 6px;
}


.tablet {
    background-color: black;
  position: absolute;
  bottom: 30px;
  right: 60px;
  width: 90px;
  height: 130px;
  border: 7px solid #ffffff;
  border-radius: 10px;
}


.mobile {
    background-color: black;
  position: absolute;
  bottom: 10px;
  left: 240px;
  width: 45px;
  height: 90px;
  border: 7px solid #ffffff;
  border-radius: 12px;
}
    </style>
  <meta charset="UTF-8">
  <title>Responsive Devices</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="devices">
  <div class="pc"></div>
  <div class="laptop"></div><br>
  <div class="tablet"></div><br>
  <div class="mobile"></div>
</div>

</body>
</html>
